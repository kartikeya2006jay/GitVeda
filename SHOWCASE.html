<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitVeda | Neural Architecture Showcase</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #06b6d4;
            --bg: #020617;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            display: grid;
            place-items: center;
            height: 100vh;
        }

        .canvas {
            perspective: 1200px;
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            position: relative;
        }

        .scene {
            width: 300px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        .core {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--primary), transparent);
            border-radius: 50%;
            left: 100px;
            top: 100px;
            box-shadow: 0 0 50px var(--primary);
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px white;
        }

        .module {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: grid;
            place-items: center;
            font-size: 0.7rem;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .module:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .m1 {
            transform: rotateY(0deg) translateZ(250px);
        }

        .m2 {
            transform: rotateY(60deg) translateZ(250px);
        }

        .m3 {
            transform: rotateY(120deg) translateZ(250px);
        }

        .m4 {
            transform: rotateY(180deg) translateZ(250px);
        }

        .m5 {
            transform: rotateY(240deg) translateZ(250px);
        }

        .m6 {
            transform: rotateY(300deg) translateZ(250px);
        }

        .ui {
            position: fixed;
            bottom: 40px;
            text-align: center;
            z-index: 100;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .header {
            position: fixed;
            top: 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, white, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>NEURAL ARCHITECTURE</h1>
        <p style="color: grey">SYSTEM OVERVIEW v1.0.4</p>
    </div>

    <div class="canvas">
        <div class="scene">
            <div class="core">VEDA</div>
            <div class="module m1">GAME<br>ENGINE</div>
            <div class="module m2">TERMINAL<br>CORE</div>
            <div class="module m3">GRAPH<br>VISUALS</div>
            <div class="module m4">AUTH<br>VAULT</div>
            <div class="module m5">MISSION<br>CTRL</div>
            <div class="module m6">NEURAL<br>INTEL</div>
        </div>
    </div>

    <div class="ui">
        <a href="https://github.com/kartikeya2006jay/GitVeda" class="btn">Return to Source</a>
    </div>
</body>

</html>
