<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitVeda | Neural 3D Showcase</title>
    <style>
        body {
            margin: 0;
            background: #020617;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, #fff, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>NEURAL ARCHITECTURE</h1>
        <p style="color: #94a3b8; letter-spacing: 0.4em;">GITVEDA KNOWLEDGE ENGINE v1.0.4</p>
    </div>

    <div id="canvas-container"></div>

    <div class="controls">
        <a href="/" class="btn">Launch Core</a>
        <a href="https://github.com/kartikeya2006jay/GitVeda" class="btn">Source Code</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Core Crystal
        const geometry = new THREE.IcosahedronGeometry(2, 0);
        const material = new THREE.MeshPhongMaterial({
            color: 0x6366f1,
            wireframe: true,
            emissive: 0x6366f1,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.8
        });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        // Particle System (Neural Network)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 15;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02,
            color: 0x06b6d4,
            transparent: true,
            opacity: 0.5
        });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // Inner Core Glow
        const innerGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const innerMat = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.2
        });
        const innerCore = new THREE.Mesh(innerGeo, innerMat);
        scene.add(innerCore);

        // Lighting
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        camera.position.z = 5;

        // Mouse Rotation
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX / window.innerWidth - 0.5;
            mouseY = e.clientY / window.innerHeight - 0.5;
        });

        function animate() {
            requestAnimationFrame(animate);

            core.rotation.y += 0.005;
            core.rotation.x += 0.003;
            innerCore.rotation.y -= 0.005;

            particles.rotation.y += 0.001;
            particles.rotation.x = mouseY * 0.5;
            particles.rotation.y = mouseX * 0.5;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
